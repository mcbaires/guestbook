<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guestbook</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 2rem 1rem;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    header p {
      margin-top: 0.4rem;
      opacity: 0.7;
      font-size: 0.95rem;
    }

    #auth-bar {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    #auth-email {
      font-size: 0.82rem;
      opacity: 0.8;
    }

    .btn-auth {
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.4);
      background: transparent;
      color: #fff;
      transition: background 0.15s;
    }

    .btn-auth:hover { background: rgba(255,255,255,0.1); }

    main {
      max-width: 680px;
      margin: 2.5rem auto;
      padding: 0 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.75rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 1.25rem;
      color: #333;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s;
      outline: none;
      background: #fafafa;
    }

    input:focus, textarea:focus {
      border-color: #7c3aed;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .field { margin-bottom: 1rem; }

    .error {
      color: #e53935;
      font-size: 0.82rem;
      margin-top: 0.3rem;
      display: none;
    }

    button[type="submit"] {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.75rem;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: #6d28d9; }
    button[type="submit"]:disabled { background: #c4b5fd; cursor: not-allowed; }

    /* Auth modal */
    #auth-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #auth-modal.open { display: flex; }

    .modal-box {
      background: #fff;
      border-radius: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      margin: 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .modal-box h2 {
      font-size: 1.2rem;
      margin-bottom: 1.25rem;
      color: #1a1a1a;
    }

    #auth-error {
      color: #e53935;
      font-size: 0.83rem;
      margin-bottom: 0.75rem;
      display: none;
    }

    .modal-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 1rem;
    }

    .btn-primary {
      flex: 1;
      padding: 0.7rem;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #6d28d9; }
    .btn-primary:disabled { background: #c4b5fd; cursor: not-allowed; }

    .btn-secondary {
      flex: 1;
      padding: 0.7rem;
      background: transparent;
      color: #555;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .btn-secondary:hover { border-color: #aaa; }

    .entries-section { margin-top: 2.5rem; }

    .entries-section h2 {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 1rem;
    }

    #entries-list { display: flex; flex-direction: column; gap: 1rem; }

    .entry {
      background: #fff;
      border-radius: 10px;
      padding: 1.1rem 1.4rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      border-left: 4px solid #7c3aed;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
      gap: 0.25rem;
    }

    .entry-name { font-weight: 700; font-size: 1rem; }
    .entry-time { font-size: 0.78rem; color: #999; }

    .entry-message {
      font-size: 0.93rem;
      line-height: 1.55;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      text-align: center;
      color: #aaa;
      padding: 2rem 0;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Guestbook</h1>
  <p>Leave a message for the world to see.</p>
  <div id="auth-bar">
    <span id="auth-email"></span>
    <button class="btn-auth" id="auth-btn">Sign In</button>
  </div>
</header>

<!-- Sign in modal -->
<div id="auth-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-box">
    <h2 id="modal-title">Sign In</h2>
    <div id="auth-error"></div>
    <div class="field">
      <label for="auth-email-input">Email</label>
      <input id="auth-email-input" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="auth-password-input">Password</label>
      <input id="auth-password-input" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="signin-btn">Sign In</button>
      <button class="btn-secondary" id="cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<main>
  <div class="card">
    <h2>Sign the guestbook</h2>
    <form id="guestbook-form" novalidate>
      <div class="field">
        <label for="name">Your name</label>
        <input id="name" type="text" placeholder="Jane Doe" maxlength="100" autocomplete="name" />
        <div class="error" id="name-error">Please enter your name.</div>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Write something nice..." maxlength="1000"></textarea>
        <div class="error" id="message-error">Please enter a message.</div>
      </div>
      <button type="submit" id="submit-btn">Post Message</button>
    </form>
  </div>

  <section class="entries-section">
    <h2 id="entries-heading">Entries</h2>
    <div id="entries-list">
      <p class="empty">No entries yet. Be the first!</p>
    </div>
  </section>
</main>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://xrjamvkwjdlhnxiewdvw.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_6SAGMpOtM_7alT2wDp2xnA_RS9XXVSS';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // DOM refs
  const authBtn       = document.getElementById('auth-btn');
  const authEmailSpan = document.getElementById('auth-email');
  const authModal     = document.getElementById('auth-modal');
  const authError     = document.getElementById('auth-error');
  const emailInput    = document.getElementById('auth-email-input');
  const passwordInput = document.getElementById('auth-password-input');
  const signinBtn     = document.getElementById('signin-btn');
  const cancelBtn     = document.getElementById('cancel-btn');
  const form          = document.getElementById('guestbook-form');
  const nameInput     = document.getElementById('name');
  const messageInput  = document.getElementById('message');
  const submitBtn     = document.getElementById('submit-btn');
  const entriesList   = document.getElementById('entries-list');
  const entriesHeading = document.getElementById('entries-heading');

  // --- Auth UI ---

  function setAuthUI(user) {
    if (user) {
      authEmailSpan.textContent = user.email;
      authBtn.textContent = 'Sign Out';
      // Pre-fill name if empty
      if (!nameInput.value) nameInput.value = user.email.split('@')[0];
    } else {
      authEmailSpan.textContent = '';
      authBtn.textContent = 'Sign In';
    }
  }

  authBtn.addEventListener('click', async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      await supabase.auth.signOut();
      setAuthUI(null);
      nameInput.value = '';
    } else {
      openModal();
    }
  });

  function openModal() {
    authModal.classList.add('open');
    authError.style.display = 'none';
    authError.textContent = '';
    emailInput.value = '';
    passwordInput.value = '';
    emailInput.focus();
  }

  function closeModal() {
    authModal.classList.remove('open');
  }

  cancelBtn.addEventListener('click', closeModal);
  authModal.addEventListener('click', (e) => { if (e.target === authModal) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  signinBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
      showAuthError('Please enter your email and password.');
      return;
    }

    signinBtn.disabled = true;
    signinBtn.textContent = 'Signing in…';

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    signinBtn.disabled = false;
    signinBtn.textContent = 'Sign In';

    if (error) {
      showAuthError(error.message);
    } else {
      setAuthUI(data.user);
      closeModal();
    }
  });

  // Allow submitting the modal with Enter
  [emailInput, passwordInput].forEach(el => {
    el.addEventListener('keydown', (e) => { if (e.key === 'Enter') signinBtn.click(); });
  });

  function showAuthError(msg) {
    authError.textContent = msg;
    authError.style.display = 'block';
  }

  // --- Guestbook ---

  function formatDate(iso) {
    return new Date(iso).toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function renderEntry(entry, prepend = false) {
    const el = document.createElement('div');
    el.className = 'entry';
    el.dataset.id = entry.id;
    el.innerHTML = `
      <div class="entry-header">
        <span class="entry-name">${escapeHtml(entry.name)}</span>
        <span class="entry-time">${formatDate(entry.created_at)}</span>
      </div>
      <p class="entry-message">${escapeHtml(entry.message)}</p>
    `;
    const empty = entriesList.querySelector('.empty');
    if (empty) empty.remove();
    prepend ? entriesList.prepend(el) : entriesList.appendChild(el);
  }

  function updateHeading(count) {
    entriesHeading.textContent = count === 0 ? 'Entries' : `Entries (${count})`;
  }

  async function loadEntries() {
    const res = await fetch('/api/entries');
    const entries = await res.json();
    entriesList.innerHTML = entries.length === 0
      ? '<p class="empty">No entries yet. Be the first!</p>'
      : '';
    entries.forEach(e => renderEntry(e));
    updateHeading(entries.length);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nameVal = nameInput.value.trim();
    const messageVal = messageInput.value.trim();

    document.getElementById('name-error').style.display = nameVal ? 'none' : 'block';
    document.getElementById('message-error').style.display = messageVal ? 'none' : 'block';
    if (!nameVal || !messageVal) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Posting…';

    try {
      const res = await fetch('/api/entries', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: nameVal, message: messageVal }),
      });
      if (!res.ok) throw new Error('Server error');
      const entry = await res.json();
      renderEntry(entry, true);
      updateHeading(entriesList.querySelectorAll('.entry').length);
      form.reset();
    } catch {
      alert('Something went wrong. Please try again.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Post Message';
    }
  });

  // Init
  const { data: { session } } = await supabase.auth.getSession();
  if (session) setAuthUI(session.user);

  loadEntries();
</script>
</body>
</html>
