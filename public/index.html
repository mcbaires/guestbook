<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guestbook</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 2rem 1rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    header p {
      margin-top: 0.4rem;
      opacity: 0.7;
      font-size: 0.95rem;
    }

    main {
      max-width: 680px;
      margin: 2.5rem auto;
      padding: 0 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1.75rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 1.25rem;
      color: #333;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s;
      outline: none;
      background: #fafafa;
    }

    input:focus, textarea:focus {
      border-color: #7c3aed;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .field { margin-bottom: 1rem; }

    .error {
      color: #e53935;
      font-size: 0.82rem;
      margin-top: 0.3rem;
      display: none;
    }

    button[type="submit"] {
      margin-top: 0.5rem;
      width: 100%;
      padding: 0.75rem;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover { background: #6d28d9; }
    button[type="submit"]:disabled { background: #c4b5fd; cursor: not-allowed; }

    .entries-section { margin-top: 2.5rem; }

    .entries-section h2 {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 1rem;
    }

    #entries-list { display: flex; flex-direction: column; gap: 1rem; }

    .entry {
      background: #fff;
      border-radius: 10px;
      padding: 1.1rem 1.4rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      border-left: 4px solid #7c3aed;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
      gap: 0.25rem;
    }

    .entry-name {
      font-weight: 700;
      font-size: 1rem;
    }

    .entry-time {
      font-size: 0.78rem;
      color: #999;
    }

    .entry-message {
      font-size: 0.93rem;
      line-height: 1.55;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      text-align: center;
      color: #aaa;
      padding: 2rem 0;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Guestbook</h1>
  <p>Leave a message for the world to see.</p>
</header>

<main>
  <div class="card">
    <h2>Sign the guestbook</h2>
    <form id="guestbook-form" novalidate>
      <div class="field">
        <label for="name">Your name</label>
        <input id="name" type="text" placeholder="Jane Doe" maxlength="100" autocomplete="name" />
        <div class="error" id="name-error">Please enter your name.</div>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Write something nice..." maxlength="1000"></textarea>
        <div class="error" id="message-error">Please enter a message.</div>
      </div>
      <button type="submit" id="submit-btn">Post Message</button>
    </form>
  </div>

  <section class="entries-section">
    <h2 id="entries-heading">Entries</h2>
    <div id="entries-list">
      <p class="empty">No entries yet. Be the first!</p>
    </div>
  </section>
</main>

<script>
  const form = document.getElementById('guestbook-form');
  const nameInput = document.getElementById('name');
  const messageInput = document.getElementById('message');
  const submitBtn = document.getElementById('submit-btn');
  const entriesList = document.getElementById('entries-list');
  const entriesHeading = document.getElementById('entries-heading');

  function formatDate(iso) {
    return new Date(iso).toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  }

  function renderEntry(entry, prepend = false) {
    const el = document.createElement('div');
    el.className = 'entry';
    el.dataset.id = entry.id;
    el.innerHTML = `
      <div class="entry-header">
        <span class="entry-name">${escapeHtml(entry.name)}</span>
        <span class="entry-time">${formatDate(entry.timestamp)}</span>
      </div>
      <p class="entry-message">${escapeHtml(entry.message)}</p>
    `;

    const empty = entriesList.querySelector('.empty');
    if (empty) empty.remove();

    if (prepend) {
      entriesList.prepend(el);
    } else {
      entriesList.appendChild(el);
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function updateHeading(count) {
    entriesHeading.textContent = count === 0 ? 'Entries' : `Entries (${count})`;
  }

  async function loadEntries() {
    const res = await fetch('/api/entries');
    const entries = await res.json();
    entriesList.innerHTML = entries.length === 0
      ? '<p class="empty">No entries yet. Be the first!</p>'
      : '';
    entries.forEach(e => renderEntry(e));
    updateHeading(entries.length);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    let valid = true;
    const nameVal = nameInput.value.trim();
    const messageVal = messageInput.value.trim();

    document.getElementById('name-error').style.display = nameVal ? 'none' : 'block';
    document.getElementById('message-error').style.display = messageVal ? 'none' : 'block';
    if (!nameVal || !messageVal) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Posting…';

    try {
      const res = await fetch('/api/entries', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: nameVal, message: messageVal }),
      });

      if (!res.ok) throw new Error('Server error');

      const entry = await res.json();
      renderEntry(entry, true);

      const current = entriesList.querySelectorAll('.entry').length;
      updateHeading(current);

      form.reset();
    } catch (err) {
      alert('Something went wrong. Please try again.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Post Message';
    }
  });

  loadEntries();
</script>
</body>
</html>
